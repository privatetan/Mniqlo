services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: mniqlo-app:local
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      JOB_WORKER_ENABLED: ${JOB_WORKER_ENABLED:-true}
      PG_BOSS_SCHEMA: ${PG_BOSS_SCHEMA:-pgboss}
      PG_BOSS_MIGRATE: ${PG_BOSS_MIGRATE:-true}
      PG_BOSS_CREATE_SCHEMA: ${PG_BOSS_CREATE_SCHEMA:-true}
      PG_BOSS_SSL_REJECT_UNAUTHORIZED: ${PG_BOSS_SSL_REJECT_UNAUTHORIZED:-false}
    ports:
      - "${APP_PORT:-13300}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/cron-init').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
